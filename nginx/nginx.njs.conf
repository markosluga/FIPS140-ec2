# NGINX configuration with njs (NGINX JavaScript) for field-level encryption
# Requirements: 1.1, 1.2, 4.2, 5.5

# Load njs module (installed via apk add nginx-module-njs)
load_module modules/ngx_http_js_module.so;

# Expose AWS credential env vars to njs workers (required for process.env access)
env AWS_ACCESS_KEY_ID;
env AWS_SECRET_ACCESS_KEY;
env AWS_SESSION_TOKEN;

worker_processes 1;
error_log /var/log/nginx/error.log info;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format for demo visibility
    log_format demo_format '$remote_addr - $remote_user [$time_local] '
                          '"$request" $status $body_bytes_sent '
                          '"$http_referer" "$http_user_agent" '
                          'rt=$request_time';

    access_log /var/log/nginx/access.log demo_format;

    # DNS resolver for Docker service discovery
    resolver 127.0.0.11 valid=30s;

    # Trust system CA bundle for ngx.fetch HTTPS calls (e.g. to KMS)
    js_fetch_trusted_certificate /etc/ssl/certs/ca-certificates.crt;

    # njs module path and import
    # Requirement 4.2: module loads field selectors from config at startup
    js_path "/etc/nginx/js/";
    js_import encryption from encryption_module.js;

    server {
        listen 80;
        server_name localhost;

        # Serve static files for Demo Web UI
        # Requirement 5.5: Demo Web UI interface
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # API endpoint - encrypt request, proxy to backend
        # Requirements: 1.1 (encrypt), 1.2 (decrypt)
        # More-specific locations (/api/decrypt, /api/flush-cache) take precedence
        location /api/ {
            client_body_buffer_size 1m;
            client_max_body_size 1m;
            client_body_in_single_buffer on;
            js_content encryption.proxyAndEncrypt;
        }

        # Decrypt endpoint - takes ciphertext fields and returns plaintext
        location /api/decrypt {
            client_body_buffer_size 1m;
            client_max_body_size 1m;
            client_body_in_single_buffer on;
            js_content encryption.decryptHandler;
        }

        # Flush key cache endpoint
        location /api/flush-cache {
            js_content encryption.flushCacheHandler;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 '{"status": "healthy", "service": "nginx-encryption-proxy"}\n';
            add_header Content-Type application/json;
        }
    }
}
