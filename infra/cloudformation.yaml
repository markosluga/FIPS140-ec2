AWSTemplateFormatVersion: "2010-09-09"
Description: >
  FIPS140-nginx-demo infrastructure — IAM role, instance profile, and EC2
  launch template for spinning up spot instances running the nginx demo stack.

# ---------------------------------------------------------------------------
# Parameters — override at deploy time to target a different environment
# ---------------------------------------------------------------------------
Parameters:

  AmiId:
    Type: AWS::EC2::Image::Id
    Default: ami-XXXXXXXXXXXXXXXXX
    Description: >
      Latest Ubuntu 24.04 LTS AMI (Canonical owner 099720109477). The spin-up
      scripts resolve this dynamically at launch time — update this default when
      recreating the stack in a new region or after a Ubuntu release.
      Find the latest AMI:
        aws ec2 describe-images --region us-east-1 --owners 099720109477
          --filters "Name=name,Values=ubuntu/images/hvm-ssd-gp3/ubuntu-noble-24.04-amd64-server-*"
                    "Name=state,Values=available"
          --query "sort_by(Images, &CreationDate)[-1].ImageId" --output text

  InstanceType:
    Type: String
    Default: t3.micro
    Description: EC2 instance type

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: <your-key-pair-name>
    Description: >
      EC2 key pair for SSH access.
      List available key pairs:
        aws ec2 describe-key-pairs --region us-east-1 --query "KeyPairs[*].KeyName" --output table

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-XXXXXXXXXXXXXXXXX
    Description: >
      Subnet to launch instances into (must be a public subnet).
      List subnets:
        aws ec2 describe-subnets --region us-east-1
          --query "Subnets[*].{SubnetId:SubnetId,AZ:AvailabilityZone,CIDR:CidrBlock}" --output table

  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Default: sg-XXXXXXXXXXXXXXXXX
    Description: >
      Security group to attach to instances.
      List security groups:
        aws ec2 describe-security-groups --region us-east-1
          --query "SecurityGroups[*].{GroupId:GroupId,Name:GroupName,VPC:VpcId}" --output table
      Create a new SG with HTTP (port 80) open:
        SG_ID=$(aws ec2 create-security-group --region us-east-1
          --group-name "my-demo-sg" --description "Allow HTTP" --vpc-id <vpc-id>
          --query GroupId --output text)
        aws ec2 authorize-security-group-ingress --region us-east-1
          --group-id "$SG_ID" --protocol tcp --port 80 --cidr 0.0.0.0/0

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # -------------------------------------------------------------------------
  # IAM Role
  # Trusted by the EC2 service. Grants the kms-bridge container the minimum
  # KMS permissions it needs — boto3 picks up credentials automatically from
  # the EC2 instance metadata service (IMDSv2), so no credentials need to be
  # passed explicitly to the Docker container.
  # -------------------------------------------------------------------------
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: FIPS140-nginx-demo
      Description: Instance role for FIPS140-nginx-demo - KMS access for kms-bridge
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      MaxSessionDuration: 3600
      Policies:
        - PolicyName: KMSAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - kms:Encrypt
                  - kms:Decrypt
                  - kms:GenerateDataKey
                  - kms:DescribeKey
                Resource: "*"

  # -------------------------------------------------------------------------
  # Instance Profile
  # Wraps the role so it can be attached to EC2 instances.
  # -------------------------------------------------------------------------
  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: FIPS140-nginx-demo
      Roles:
        - !Ref InstanceRole

  # -------------------------------------------------------------------------
  # Launch Template
  # Spot instance, t3.micro, public IP via network interface.
  # UserData installs a systemd service that runs `docker compose up` on boot.
  # IMDSv2 (HttpTokens: required) is enforced.
  # -------------------------------------------------------------------------
  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: FIPS140-nginx-demo
      LaunchTemplateData:
        ImageId: !Ref AmiId
        InstanceType: !Ref InstanceType
        KeyName: !Ref KeyName

        IamInstanceProfile:
          Name: !Ref InstanceProfile

        # Spot market — one-time request, terminate on interruption
        InstanceMarketOptions:
          MarketType: spot
          SpotOptions:
            SpotInstanceType: one-time
            InstanceInterruptionBehavior: terminate

        # Network interface required to assign a public IP on a specific subnet
        NetworkInterfaces:
          - DeviceIndex: 0
            SubnetId: !Ref SubnetId
            AssociatePublicIpAddress: true
            Groups:
              - !Ref SecurityGroupId

        # IMDSv2 enforced — hop limit 2 allows containers to reach the metadata service
        MetadataOptions:
          HttpTokens: required
          HttpEndpoint: enabled
          HttpPutResponseHopLimit: 2

        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: FIPS140-nginx-demo

        # On first boot: installs git + docker, clones the deploy-on-ec2 branch
        # into /home/ubuntu/FIPS140, then installs and starts a systemd service
        # that runs `docker compose up` on every subsequent boot.
        # See userdata.sh in the repo root for the un-encoded version.
        UserData:
          Fn::Base64: |
            #!/bin/bash
            set -e

            apt-get update -y
            apt-get install -y git ca-certificates curl gnupg

            if ! command -v docker &> /dev/null; then
              install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              chmod a+r /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
                https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" \
                > /etc/apt/sources.list.d/docker.list
              apt-get update -y
              apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
              systemctl enable docker
              systemctl start docker
              usermod -aG docker ubuntu
            fi

            git clone https://github.com/markosluga/FIPS140-ec2.git /home/ubuntu/FIPS140-ec2
            chown -R ubuntu:ubuntu /home/ubuntu/FIPS140-ec2

            cat > /usr/local/bin/fetch-imds-credentials.sh << 'EOF'
            #!/bin/bash
            TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" \
              -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
            ROLE=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" \
              http://169.254.169.254/latest/meta-data/iam/security-credentials/)
            CREDS=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" \
              http://169.254.169.254/latest/meta-data/iam/security-credentials/$ROLE)
            cat > /home/ubuntu/FIPS140-ec2/.env << ENVEOF
            AWS_ACCESS_KEY_ID=$(echo $CREDS | python3 -c "import sys,json; print(json.load(sys.stdin)['AccessKeyId'])")
            AWS_SECRET_ACCESS_KEY=$(echo $CREDS | python3 -c "import sys,json; print(json.load(sys.stdin)['SecretAccessKey'])")
            AWS_SESSION_TOKEN=$(echo $CREDS | python3 -c "import sys,json; print(json.load(sys.stdin)['Token'])")
            ENVEOF
            chmod 600 /home/ubuntu/FIPS140-ec2/.env
            EOF
            chmod +x /usr/local/bin/fetch-imds-credentials.sh

            cat > /etc/systemd/system/fips140-nginx-demo.service << 'EOF'
            [Unit]
            Description=FIPS140 nginx demo
            After=docker.service
            Requires=docker.service

            [Service]
            WorkingDirectory=/home/ubuntu/FIPS140-ec2
            ExecStartPre=/usr/local/bin/fetch-imds-credentials.sh
            ExecStart=/usr/bin/docker compose up
            ExecStop=/usr/bin/docker compose down
            Restart=always
            RestartSec=10

            [Install]
            WantedBy=multi-user.target
            EOF

            systemctl daemon-reload
            systemctl enable fips140-nginx-demo
            systemctl start fips140-nginx-demo

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:

  InstanceRoleArn:
    Description: ARN of the IAM role
    Value: !GetAtt InstanceRole.Arn

  InstanceProfileArn:
    Description: ARN of the instance profile
    Value: !GetAtt InstanceProfile.Arn

  LaunchTemplateId:
    Description: ID of the launch template
    Value: !Ref LaunchTemplate

  LaunchTemplateLatestVersion:
    Description: Latest version number of the launch template
    Value: !GetAtt LaunchTemplate.LatestVersionNumber
